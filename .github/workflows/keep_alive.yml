name: Wake Up Cinoppy Scraper
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour, 24/7
  workflow_dispatch:      # Adds a "Run now" button for testing

jobs:
  ping_scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Send Heartbeat to Hugging Face
        run: |
          curl -I https://demandapps-cinoppy-crawler.hf.space/health